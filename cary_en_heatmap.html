var BRACKETS=[
  {lo:0,      hi:400000,  c:'#22c55e', g:'#22c55e77', lbl:'under $400K'},
  {lo:400000, hi:500000,  c:'#6abf4b', g:'#6abf4b66', lbl:'$400–$500K'},
  {lo:500000, hi:600000,  c:'#a3c837', g:'#a3c83755', lbl:'$500–$600K'},
  {lo:600000, hi:700000,  c:'#facc15', g:'#facc1555', lbl:'$600–$700K'},
  {lo:700000, hi:800000,  c:'#f5a623', g:'#f5a62355', lbl:'$700–$800K'},
  {lo:800000, hi:900000,  c:'#f97316', g:'#f9731655', lbl:'$800–$900K'},
  {lo:900000, hi:1000000, c:'#ef4444', g:'#ef444455', lbl:'$900K–$1M'},
  {lo:1000000,hi:1200000, c:'#dc2626', g:'#dc262655', lbl:'$1M–$1.2M'},
  {lo:1200000,hi:1500000, c:'#b91c1c', g:'#b91c1c66', lbl:'$1.2M–$1.5M'},
  {lo:1500000,hi:9999999, c:'#7f1d1d', g:'#7f1d1d88', lbl:'$1.5M+'}
];

function priceColor(p){
  for(var i=0;i<BRACKETS.length;i++){
    var b=BRACKETS[i];
    if(b.hi===9999999?p>=b.lo:p>=b.lo&&p<b.hi) return b;
  }
  return BRACKETS[BRACKETS.length-1];
}

var map=L.map('map',{
  center:[35.782,-78.790],
  zoom:12,
  renderer:L.canvas({padding:0.5})
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',
  subdomains:'abcd',maxZoom:19
}).addTo(map);

var layer=L.layerGroup().addTo(map);
var current=D.slice();
var activePriceFilter=null;

function fmt(n){return '$'+Number(n).toLocaleString('en-US')}

function draw(arr){
  layer.clearLayers();
  arr.forEach(function(h){
    var bc=priceColor(h[2]);
    var c=L.circleMarker([h[0],h[1]],{
      radius:5,fillColor:bc.c,color:bc.g,weight:1,fillOpacity:0.82,opacity:0.5
    });
    var typeLabel=h[9]==='SFR'?'Single Family':'Townhouse';
    c.bindTooltip(
      '<b>'+h[3]+'</b> '+h[4]+'<br>'+
      '<span style="color:'+bc.c+';font-weight:700">'+fmt(h[2])+'</span>'+
      (h[5]?' · '+h[5]+' bd':'')+(h[6]?' / '+h[6]+' ba':'')+
      (h[7]?' · '+Number(h[7]).toLocaleString()+' ft²':'')+
      (h[8]?' · built '+h[8]:'')+'<br>'+
      '<span style="color:#7a8699;font-size:11px">'+typeLabel+'</span>',
      {sticky:true,offset:[10,0]}
    );
    layer.addLayer(c);
  });
}

function buildLegend(arr){
  var counts={};
  arr.forEach(function(h){ var l=priceColor(h[2]).lbl; counts[l]=(counts[l]||0)+1; });
  var rows=document.getElementById('legend-rows');
  rows.innerHTML='';
  BRACKETS.forEach(function(b){
    var cnt=counts[b.lbl]||0;
    if(!cnt) return;
    var div=document.createElement('div');
    div.className='lr'+(activePriceFilter===b.lbl?' active-filter':'');
    div.innerHTML='<div class="dot" style="background:'+b.c+'"></div>'+
      '<span class="lbl">'+b.lbl+'</span><span class="cnt">'+cnt+'</span>';
    div.onclick=(function(bk){ return function(){
      activePriceFilter=activePriceFilter===bk.lbl?null:bk.lbl;
      applyFilter();
    };})(b);
    rows.appendChild(div);
  });
  document.getElementById('clear-btn').style.display=activePriceFilter?'block':'none';
}

function clearFilter(){ activePriceFilter=null; applyFilter(); }

function applyFilter(){
  var ft=document.getElementById('ft').value;
  var yrFrom=parseInt(document.getElementById('yr-from').value)||0;
  var yrTo=parseInt(document.getElementById('yr-to').value)||9999;
  var sqFrom=parseInt(document.getElementById('sqft-from').value)||0;
  var sqTo=parseInt(document.getElementById('sqft-to').value)||99999;
  current=D.filter(function(h){
    var typeOk=!ft||h[9]===ft;
    var yr=h[8]?parseInt(h[8]):null;
    var yrOk=!yr||(yr>=yrFrom&&yr<=yrTo);
    var sq=h[7]?parseInt(h[7]):null;
    var sqOk=!sq||(sq>=sqFrom&&sq<=sqTo);
    var prOk=!activePriceFilter||priceColor(h[2]).lbl===activePriceFilter;
    return typeOk&&yrOk&&sqOk&&prOk;
  });
  draw(current);
  buildLegend(current);
}

draw(current);
buildLegend(current);
